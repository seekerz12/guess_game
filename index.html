    <title>Guess Game</title>

  <body>
    <div class="main-container">
      <h2>Guess Game</h2>
      <div style="margin-bottom: 10px">
        Guess a number between 1 - 20, you have 5 chances.
      </div>
      <div class="input">
        <input type="text" id="guess-value" name="guess-value" />
        <button id="guess-btn">Guess!</button>
        <button id="restart-btn">Restart</button>
      </div>
      <hr />
      <div id="attempt-text" style="margin-bottom: 10px">
        Attempt <span id="attempt"></span>/5
      </div>
      <div id="result"></div>
    </div>

    <script>
      let targetValue = 0;
      let attempts = 0;

     
      function isNumeric(n) {
        return !isNaN(parseFloat(n)) && isFinite(n);
      }

   
      function initGame() {
        document.getElementById("guess-value").value = "";
        document.getElementById("restart-btn").style.display = "inline-block";
        document.getElementById("guess-btn").style.display = "none";
        document.getElementById("attempt").innerText = "0";
        document.getElementById("result").innerText = "";
      }

    
      function restartGame() {
        document.getElementById("restart-btn").style.display = "none";
        document.getElementById("guess-btn").style.display = "inline-block";
        
       
        targetValue = Math.floor(Math.random() * 20) + 1;
        attempts = 0;
        
        document.getElementById("attempt").innerText = "0";
        document.getElementById("result").innerText = "";
        
        let guessInput = document.getElementById("guess-value");
        guessInput.value = "";
        guessInput.focus();
      }

      
      function makeGuess() {
        let guessInput = document.getElementById("guess-value");
        let inputValue = guessInput.value;

       
        if (inputValue === "" || !isNumeric(inputValue)) {
          return; 
        }

        let numericValue = Number(inputValue);
        attempts++;
        document.getElementById("attempt").innerText = attempts;

        let resultDiv = document.getElementById("result");

       
        if (numericValue === targetValue) {
          resultDiv.innerText = "You WIN";
          document.getElementById("guess-btn").style.display = "none";
          document.getElementById("restart-btn").style.display = "inline-block";
        } else {
   
          if (attempts >= 5) {
            resultDiv.innerText = "You LOSE";
            document.getElementById("guess-btn").style.display = "none";
            document.getElementById("restart-btn").style.display = "inline-block";
          } else {
           
            if (numericValue > targetValue) {
              resultDiv.innerText = numericValue + " is too high";
            } else {
              resultDiv.innerText = numericValue + " is too low";
            }
          }
        }
        guessInput.value = "";
        guessInput.focus();
      }

      window.onload = function() {
        initGame();
        document.getElementById("restart-btn").onclick = restartGame;
        document.getElementById("guess-btn").onclick = makeGuess;
      };
    </script>
  </body>

</html>
